<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Sea Battle</title>
</head>
<body>
    <div class="board">
        <div class="corner"></div>

        <div class="rows">
            <div>A</div>
            <div>B</div>
            <div>C</div>
            <div>D</div>
            <div>E</div>
            <div>F</div>
            <div>G</div>
            <div>H</div>
            <div>I</div>
            <div>J</div>
        </div>

        <div class="cols">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
            <div>10</div>
        </div>

        <div class="battlefield">
            <div class="ship purple a1-b1"></div>
            <div class="ship green d1-d3"></div>
            <div class="ship blue g1-j1"></div>

            <div class="ship blue a3-a6"></div>
            <div class="ship green f3-h3"></div>
            <div class="ship purple j3-j4"></div>

            <div class="ship purple f6-f7"></div>
            <div class="ship green j6-j8"></div>
            <div class="ship purple a8-b8"></div>
            <div class="ship red f10-j10"></div>
        </div>

    </div>
</body>
</html>
